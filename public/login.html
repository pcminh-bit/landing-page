<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #111827;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .subtitle {
      margin: 0 0 16px;
      color: #4b5563;
      font-size: 14px;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    label {
      font-size: 14px;
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-family: inherit;
    }
    button {
      width: 100%;
      border: 0;
      background: #111827;
      color: #fff;
      border-radius: 8px;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .error {
      min-height: 20px;
      margin-top: 10px;
      color: #b91c1c;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <h1>Admin Login</h1>
    <p class="subtitle">Đăng nhập để truy cập trang quản trị</p>
    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button type="submit">Đăng nhập</button>
      <p id="errorMsg" class="error"></p>
    </form>
  </main>

  <script>
    (async function checkExistingSession() {
      try {
        const response = await fetch("/api/auth/check", { credentials: "same-origin" });
        if (response.ok) {
          window.location.replace("/admin");
        }
      } catch (_) {}
    })();

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorMsg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ username, password }),
        });
        if (response.ok) {
          window.location.replace("/admin");
          return;
        }
        const payload = await response.json().catch(() => ({}));
        errorMsg.textContent = payload.error || "Sai tên đăng nhập hoặc mật khẩu";
      } catch (_) {
        errorMsg.textContent = "Sai tên đăng nhập hoặc mật khẩu";
      }
    });
  </script>
</body>
</html>
