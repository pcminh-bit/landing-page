# Nginx reverse proxy for hocbong-upgrad.com
# Copy to /etc/nginx/sites-available/hocbong-upgrad.com
# Then: sudo ln -sf /etc/nginx/sites-available/hocbong-upgrad.com /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name hocbong-upgrad.com www.hocbong-upgrad.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
