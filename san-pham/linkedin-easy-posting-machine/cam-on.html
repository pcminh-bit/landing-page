<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cảm ơn · LinkedIn Easy Posting Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/san-pham/linkedin-easy-posting-machine/product.css" />
</head>
<body>
  <div class="wrap">
    <div class="card" style="text-align:center;">
      <span class="badge">Cảm ơn</span>
      <h1 id="headline">Đang xác nhận thanh toán…</h1>
      <p class="tagline" id="subline">Giữ trang mở nếu bạn vừa chuyển khoản.</p>

      <div id="pendingBlock">
        <p class="muted">Mã đơn: <strong id="orderCodeLabel"></strong></p>
        <p class="muted" id="waitNote"></p>
      </div>

      <div id="successBlock" class="hidden">
        <div class="thank" id="thankMsg">File đã sẵn sàng.</div>
        <a class="btn" id="downloadBtn" href="#" style="margin-top:16px;">Tải file ZIP</a>
        <p class="muted" id="emailNote">Chúng tôi đã gửi link vào email của bạn.</p>
      </div>

      <a class="back" href="/san-pham/linkedin-easy-posting-machine/">← Trang sản phẩm</a>
    </div>
  </div>
  <script src="/san-pham/linkedin-easy-posting-machine/digital-checkout.js"></script>
  <script>
    (function () {
      const { qs, pollOrderStatus } = DigitalCheckout;
      const code = (qs("order_code") || "").trim();
      const headline = document.getElementById("headline");
      const subline = document.getElementById("subline");
      const successBlock = document.getElementById("successBlock");
      const pendingBlock = document.getElementById("pendingBlock");
      const downloadBtn = document.getElementById("downloadBtn");
      const orderCodeLabel = document.getElementById("orderCodeLabel");
      const waitNote = document.getElementById("waitNote");
      const thankMsg = document.getElementById("thankMsg");
      const emailNote = document.getElementById("emailNote");

      if (!code) {
        headline.textContent = "Thiếu mã đơn";
        subline.textContent = "Quay lại checkout và thử lại.";
        pendingBlock.classList.add("hidden");
        return;
      }

      orderCodeLabel.textContent = code;

      function showSuccess(data) {
        headline.textContent = "Cảm ơn bạn!";
        subline.textContent = data.product_name || "LinkedIn Easy Posting Machine";
        pendingBlock.classList.add("hidden");
        successBlock.classList.remove("hidden");
        if (data.download_url) {
          downloadBtn.href = data.download_url;
        } else {
          downloadBtn.classList.add("hidden");
        }
        thankMsg.textContent = "Thanh toán đã xác nhận. File ZIP sẵn sàng tải.";
        emailNote.textContent =
          "Link tải cũng được gửi vào email bạn đã đăng ký. Lưu email để tải lại sau.";
      }

      pollOrderStatus(
        code,
        showSuccess,
        (data) => {
          if (data.status === "pending") {
            waitNote.textContent = "Hệ thống kiểm tra mỗi vài giây…";
          }
        }
      );
    })();
  </script>
</body>
</html>
